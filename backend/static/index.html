<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WasteVision-AI – Scan waste</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 12px;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    h1 { font-size: 1.4rem; margin: 0 0 8px; }
    .sub { color: #94a3b8; font-size: 0.9rem; margin-bottom: 16px; }
    #preview {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 12px;
      background: #1e293b;
    }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #capture {
      background: #22c55e;
      color: #fff;
    }
    #capture:disabled { background: #475569; cursor: not-allowed; }
    #result {
      margin-top: 20px;
      padding: 16px;
      background: #1e293b;
      border-radius: 12px;
      display: none;
    }
    #result.visible { display: block; }
    .category { font-size: 1.2rem; font-weight: 600; color: #38bdf8; margin-bottom: 8px; }
    .bin { color: #a5b4fc; margin-bottom: 8px; }
    .instructions { white-space: pre-line; color: #cbd5e1; font-size: 0.95rem; line-height: 1.5; }
    .confidence { font-size: 0.85rem; color: #94a3b8; margin-top: 8px; }
    .error { color: #f87171; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>WasteVision-AI</h1>
  <p class="sub">Point your camera at waste, then tap Capture to detect type and get recycling instructions.</p>

  <video id="preview" playsinline muted autoplay></video>
  <div class="actions">
    <button id="capture">Capture & classify</button>
  </div>
  <div id="status"></div>
  <div id="result">
    <div class="category" id="outCategory"></div>
    <div class="bin" id="outBin"></div>
    <div class="instructions" id="outInstructions"></div>
    <div class="confidence" id="outConfidence"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const video = document.getElementById('preview');
    const captureBtn = document.getElementById('capture');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const outCategory = document.getElementById('outCategory');
    const outBin = document.getElementById('outBin');
    const outInstructions = document.getElementById('outInstructions');
    const outConfidence = document.getElementById('outConfidence');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        statusEl.textContent = '';
      } catch (e) {
        statusEl.innerHTML = '<span class="error">Camera access denied or not available.</span>';
      }
    }

    function drawToCanvas() {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      return new Promise((res, rej) => {
        canvas.toBlob(blob => res(blob), 'image/jpeg', 0.85);
      });
    }

    captureBtn.addEventListener('click', async () => {
      if (!video.srcObject) return;
      captureBtn.disabled = true;
      statusEl.textContent = 'Classifying…';
      resultEl.classList.remove('visible');
      try {
        const blob = await drawToCanvas();
        const form = new FormData();
        form.append('file', blob, 'capture.jpg');
        const r = await fetch(API_BASE + '/predict', { method: 'POST', body: form });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || r.statusText);
        outCategory.textContent = data.object_name || data.waste_category;
        outBin.textContent = 'Bin: ' + (data.recommended_bin || '—');
        outInstructions.textContent = data.recycling_instructions || data.eco_tip || '';
        outConfidence.textContent = 'Confidence: ' + Math.round((data.confidence || 0) * 100) + '%';
        resultEl.classList.add('visible');
        statusEl.textContent = '';
      } catch (e) {
        statusEl.innerHTML = '<span class="error">' + (e.message || 'Request failed') + '</span>';
      }
      captureBtn.disabled = false;
    });

    startCamera();
  </script>
</body>
</html>
